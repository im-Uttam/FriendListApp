<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Friends List</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #f8f9fa; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #333; margin-top: 0; }
        .btn { padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: 600; display: inline-block; transition: 0.3s; }
        .btn-add { background: #4285f4; color: white; margin-bottom: 20px; }
        .btn-add:hover { background: #357abd; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; background: #f1f3f4; padding: 12px; color: #555; }
        td { padding: 12px; border-bottom: 1px solid #eee; color: #444; }
        .actions a { margin-right: 10px; text-decoration: none; font-size: 14px; }
        .edit { color: #4285f4; }
        .delete { color: #d93025; }
        nav { margin-bottom: 20px; }
        nav a { text-decoration: none; color: #666; margin-right: 15px; }
    </style>
</head>
<body>

<div class="container">
    <nav>
        <a href="/dashboard">⬅ Back to Dashboard</a>
    </nav>

    <h1>👥 Your Friends</h1>
    
    <a href="/friend-new" class="btn btn-add">+ Add New Friend</a>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Contact</th>
                <th>Email</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="friend : ${friends}">
                <td th:text="${friend.friendName}"></td>
                <td th:text="${friend.contact}"></td>
                <td th:text="${friend.email}"></td>
                <td th:text="${friend.addedAt != null ? #temporals.format(friend.addedAt, 'yyyy-MM-dd HH:mm') : 'N/A'}"></td>
                <td class="actions">
                    <a th:href="@{/friend-edit/{id}(id=${friend.id})}" class="edit">✏️ Edit</a>
                    <a th:href="@{/friend-delete/{id}(id=${friend.id})}" class="delete" 
                       onclick="return confirm('Are you sure you want to delete this friend?')">🗑️ Delete</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(friends)}">
                <td colspan="5" style="text-align: center; color: #888;">No friends added yet.</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
