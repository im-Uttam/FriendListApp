spring.application.name=java-app
spring.thymeleaf.cache=false

# Server
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/friendlist
spring.datasource.username=root
spring.datasource.password=newpassword123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - auto creates/updates tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Google OAuth - paste your credentials here
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
